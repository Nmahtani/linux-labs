name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  environment-info:
    name: Runner Environment
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Show environment info
        run: |
          echo "======================================"
          echo " linux-labs Quality Pipeline"
          echo " Triggered by: ${{ github.event_name }}"
          echo " Branch: ${{ github.ref_name }}"
          echo " Commit: ${{ github.sha }}"
          echo " Runner OS: ${{ runner.os }}"
          echo "======================================"
          echo ""
          echo "Repository contents:"
          find . -type f -name "*.sh" -o -name "*.ps1" | sort

  bash-lint:
    name: Bash Scripts — shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all Bash scripts
        run: |
          echo "Scanning Bash scripts..."
          echo ""
          FAILED=0
          PASSED=0
          SCRIPTS=$(find . -name "*.sh" | sort)

          for script in $SCRIPTS; do
            if shellcheck -e SC1091 "$script"; then
              echo "  [PASS] $script"
              ((PASSED++)) || true
            else
              echo "  [FAIL] $script"
              ((FAILED++)) || true
            fi
            echo ""
          done

          echo "======================================"
          echo " Bash lint results: $PASSED passed, $FAILED failed"
          echo "======================================"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi
  powershell-lint:
    name: PowerShell Scripts — PSScriptAnalyzer
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update -q
          sudo apt-get install -y powershell

      - name: Install PSScriptAnalyzer
        run: |
          pwsh -Command "Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser"

      - name: Run PSScriptAnalyzer on all PowerShell scripts
        run: |
          pwsh -Command "
            \$scripts = Get-ChildItem -Recurse -Filter '*.ps1' | Select-Object -ExpandProperty FullName
            \$failed = 0
            \$passed = 0

            foreach (\$script in \$scripts) {
              Write-Host \"Checking: \$script\"
              \$results = Invoke-ScriptAnalyzer -Path \$script -Severity Error,Warning -ExcludeRule PSAvoidUsingWriteHost

              if (\$results) {
                \$results | Format-Table -AutoSize
                \$failed++
                Write-Host \"  [FAIL] \$script\"
              } else {
                Write-Host \"  [PASS] \$script\"
                \$passed++
              }
              Write-Host ''
            }

            Write-Host '======================================'
            Write-Host \" PowerShell lint results: \$passed passed, \$failed failed\"
            Write-Host '======================================'

            if (\$failed -gt 0) { exit 1 }
          "
  repo-structure:
    name: Repository Structure
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Check every project has a README
        run: |
          echo "[ Checking for README files ]"
          FAILED=0
          for dir in sentinel m365-toolkit hardening-toolkit; do
            if [[ -f "$dir/README.md" ]]; then
              echo "  [PASS] $dir/README.md exists"
            else
              echo "  [FAIL] $dir/README.md is missing"
              ((FAILED++)) || true
            fi
          done
          echo ""
          if [[ $FAILED -gt 0 ]]; then
            echo "ERROR: $FAILED project(s) missing a README"
            exit 1
          fi

      - name: Check scripts have executable permissions
        run: |
          echo "[ Checking executable permissions on scripts ]"
          FAILED=0
          while IFS= read -r script; do
            if [[ -x "$script" ]]; then
              echo "  [PASS] $script is executable"
            else
              echo "  [FAIL] $script is not executable"
              ((FAILED++)) || true
            fi
          done < <(find . -name "*.sh" | sort)
          echo ""
          if [[ $FAILED -gt 0 ]]; then
            echo "ERROR: $FAILED script(s) missing executable permission"
            exit 1
          fi

      - name: Check no generated report files were committed
        run: |
          echo "[ Checking for accidentally committed report files ]"
          REPORTS=$(find . -name "report_*.csv" -o -name "last_state.txt" | sort)
          if [[ -z "$REPORTS" ]]; then
            echo "  [PASS] No generated files found in the repository"
          else
            echo "  [FAIL] Generated files should not be committed:"
            echo "$REPORTS"
            exit 1
          fi
summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [environment-info, bash-lint, powershell-lint, repo-structure]
    if: always()

    steps:
      - name: Write job summary
        run: |
          echo "## linux-labs Quality Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Runner Environment | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Bash Scripts (shellcheck) | ${{ needs.bash-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PowerShell Scripts (PSScriptAnalyzer) | ${{ needs.powershell-lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository Structure | ${{ needs.repo-structure.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }} on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
